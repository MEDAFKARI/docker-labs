apiVersion: apps/v1
kind: Deployment

metadata:
  name: memos

spec:
  replicas: 2

  selector:
    matchLabels:
      app: memos

  template:
    metadata:
      labels:
        app: memos

    spec:
      containers:
        - name: memos
          image: neosmemo/memos:stable
          ports:
          -  containerPort: 5230
